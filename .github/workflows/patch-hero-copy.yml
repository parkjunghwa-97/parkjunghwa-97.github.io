name: Patch hero copy

on:
  push:
    paths:
      - .github/workflows/patch-hero-copy.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update hero copy
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = re.sub(
              r'입주청소 · 이사청소도 가능하지만,<br>\s*대한청소만세의 중심은 특수현장 판단입니다\.',
              '특수청소부터 입주·이사청소까지,<br>\n현장 상태에 맞춰 상담합니다.',
              s,
              count=1
          )
          s = s.replace('입주·이사청소도 보기</button>', '입주·이사청소 보기</button>')
          s = s.replace('서비스 전체 보기</button>', '입주·이사청소 보기</button>')
          p.write_text(s, encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update hero copy" || exit 0
          git push
