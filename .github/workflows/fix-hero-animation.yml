name: Fix hero animation

on:
  push:
    paths:
      - ".github/hero-animation-trigger.txt"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch hero animation timing
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          original = html

          if '.hero.active::before' not in html:
              html = html.replace(
                  "      transform:scale(1.08);\n      animation:heroZoom 7s ease forwards;\n      animation-delay:.15s;",
                  "      transform:scale(1.12);\n      animation:none;"
              )
              html = html.replace(
                  "    .hero.active{display:flex}\n",
                  "    .hero.active{display:flex}\n    .hero.active::before{animation:heroZoom 7s ease forwards .15s}\n"
              )
              html = html.replace(
                  "    @keyframes heroZoom{to{transform:scale(1)}}\n",
                  "    @keyframes heroZoom{to{transform:scale(1)}}\n    @keyframes heroZoomMobile{to{transform:scale(1.03)}}\n"
              )
              html = html.replace(
                  "      .hero-inner{transform:translateY(70px)}\n",
                  "      .hero-inner{transform:translateY(70px)}\n      .hero::before{transform:scale(1.16)}\n      .hero.active::before{animation:heroZoomMobile 8s ease forwards .15s}\n"
              )

          if html == original:
              print('No hero animation changes needed.')
          else:
              path.write_text(html, encoding='utf-8')
              print('Patched hero animation timing.')
          PY

      - name: Commit patch
        run: |
          git config user.name "ChatGPT"
          git config user.email "actions@github.com"
          git add index.html
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Fix mobile hero background animation"
          git push
