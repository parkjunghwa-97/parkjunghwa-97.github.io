name: 보험서류 홈피 반영

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-home-insurance-v2.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add insurance document support content
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re
          import textwrap

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')
          before = html

          keywords_to_add = ['화재복구', '누수복구', '보험청구', '보험서류', '보험견적서']
          extra_sentence = ' 화재·누수 복구 현장의 보험청구 서류, 보험견적서 상담도 가능합니다.'

          def add_extra_to_meta(pattern, text):
              def repl(match):
                  content = match.group(2)
                  if '보험청구' not in content:
                      content = content.rstrip(' .') + '.' + extra_sentence
                  return match.group(1) + content + match.group(3)
              return re.sub(pattern, repl, text, count=1)

          html = add_extra_to_meta(r'(<meta name="description" content=")([^"]*)(">)', html)
          html = add_extra_to_meta(r'(<meta property="og:description" content=")([^"]*)(">)', html)
          html = add_extra_to_meta(r'(<meta name="twitter:description" content=")([^"]*)(">)', html)

          def add_keywords(match):
              content = match.group(2)
              items = [x.strip() for x in content.split(',') if x.strip()]
              for keyword in keywords_to_add:
                  if keyword not in items:
                      items.append(keyword)
              return match.group(1) + ', '.join(items) + match.group(3)

          html = re.sub(r'(<meta name="keywords" content=")([^"]*)(">)', add_keywords, html, count=1)

          def add_json_description(match):
              content = match.group(2)
              if '보험서류' not in content and '보험청구' not in content:
                  content = content.rstrip(' .') + ', 화재복구·누수복구 현장 보험서류 상담을 진행합니다.'
              return match.group(1) + content + match.group(3)

          html = re.sub(r'("description": ")([^"]*)(")', add_json_description, html, count=1)

          css_marker = '    /* PROCESS_FLOW_SECTION */'
          insurance_css = textwrap.dedent('''
            .hero-insurance-badge{
              display:inline-flex;
              align-items:center;
              justify-content:center;
              gap:8px;
              margin-top:16px;
              padding:10px 16px;
              border-radius:999px;
              background:rgba(255,255,255,.94);
              color:#0f172a;
              font-size:14px;
              font-weight:950;
              box-shadow:0 10px 26px rgba(0,0,0,.22);
              opacity:0;
              transform:translateY(22px);
              animation:heroTextIn 1s ease forwards;
              animation-delay:2.32s;
            }
            .hero-insurance-badge span{color:#dc2626;font-weight:950}
            .insurance-support-card{
              margin:26px auto 30px;
              max-width:900px;
              background:#fff;
              border:1px solid #e2e8f0;
              border-radius:26px;
              padding:26px;
              box-shadow:0 12px 30px rgba(15,23,42,.09);
              text-align:left;
            }
            .insurance-support-card h3{margin:0 0 12px;color:#0f172a;font-size:24px;line-height:1.35}
            .insurance-support-card p{margin:0;color:#475569;line-height:1.75;font-weight:700}
            .insurance-doc-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:18px 0 16px}
            .insurance-doc-list div{padding:12px 14px;border-radius:16px;background:#f8fafc;border:1px solid #e2e8f0;color:#0f172a;font-weight:900;line-height:1.45}
            .insurance-note{margin-top:14px!important;padding-top:14px;border-top:1px solid #e2e8f0;color:#64748b!important;font-size:14px;font-weight:800!important}
            @media(max-width:760px){.hero-insurance-badge{font-size:12.5px;padding:9px 13px;margin-top:14px}.insurance-support-card{padding:22px;border-radius:22px}.insurance-support-card h3{font-size:21px}.insurance-doc-list{grid-template-columns:1fr;gap:8px}}

          ''')

          if '.insurance-support-card' not in html:
              if css_marker in html:
                  html = html.replace(css_marker, insurance_css + css_marker, 1)
              else:
                  html = html.replace('</style>', insurance_css + '</style>', 1)

          proof = '      <div class="hero-proof">사진과 현장 상태를 확인한 뒤 작업 범위와 추가 비용 가능성을 먼저 안내합니다.</div>'
          badge = '      <div class="hero-insurance-badge">🧾 <span>보험 제출용 서류 발급 가능</span></div>'
          if '보험 제출용 서류 발급 가능' not in html:
              html = html.replace(proof, proof + '\n\n' + badge, 1)

          card = textwrap.dedent('''
            <!-- INSURANCE_SUPPORT_CARD_START -->
            <div class="insurance-support-card" aria-label="보험 제출 서류 지원 안내">
              <h3>보험 제출 서류 지원</h3>
              <p>화재복구, 누수복구 등 보험 접수가 필요한 현장은 상담 시 필요한 서류 발급 가능 여부를 함께 안내합니다.</p>
              <div class="insurance-doc-list">
                <div>✔ 보험용 견적서</div>
                <div>✔ 작업확인서</div>
                <div>✔ 작업 전·후 사진</div>
                <div>✔ 거래명세서</div>
                <div>✔ 현금영수증</div>
                <div>✔ 세금계산서(필요 시 상담)</div>
              </div>
              <p class="insurance-note">※ 보험금 지급 여부는 보험사의 심사 및 가입 약관에 따라 달라질 수 있습니다.</p>
            </div>
            <!-- INSURANCE_SUPPORT_CARD_END -->

          ''')

          if '<!-- INSURANCE_SUPPORT_CARD_START -->' not in html:
              html = html.replace('      <div class="grid">', card + '      <div class="grid">', 1)

          if html == before:
              print('No changes needed')
          else:
              path.write_text(html, encoding='utf-8')
              print('Insurance support content added')
          PY
      - name: Commit patched homepage
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add insurance document support to homepage"
          git push
