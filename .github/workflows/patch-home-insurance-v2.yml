name: Patch home insurance badge v2

on:
  push:
    branches: [main]
    paths:
      - 'patch-trigger-home-insurance.txt'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Insert home insurance badge
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          css_marker = '    /* PROCESS_FLOW_SECTION */'
          css = '''
    .hero-insurance-badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      margin-top:16px;
      padding:10px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.94);
      color:#0f172a;
      font-size:14px;
      font-weight:950;
      box-shadow:0 10px 26px rgba(0,0,0,.22);
      opacity:0;
      transform:translateY(22px);
      animation:heroTextIn 1s ease forwards;
      animation-delay:2.32s;
    }
    .hero-insurance-badge span{color:#dc2626;font-weight:950}
    @media(max-width:760px){.hero-insurance-badge{font-size:12.5px;padding:9px 13px;margin-top:14px}}

'''
          if '.hero-insurance-badge' not in text:
              text = text.replace(css_marker, css + css_marker)

          proof = '      <div class="hero-proof">사진과 현장 상태를 확인한 뒤 작업 범위와 추가 비용 가능성을 먼저 안내합니다.</div>'
          badge = '      <div class="hero-insurance-badge">🧾 <span>보험 제출용 서류 발급 가능</span></div>'
          if '보험 제출용 서류 발급 가능' not in text:
              text = text.replace(proof, proof + '\n\n' + badge)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit patched homepage
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add home insurance document badge"
          git push
