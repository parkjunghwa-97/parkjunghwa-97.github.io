name: Update Google verification meta

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-google-verification:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Google verification content
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '<meta name="google-site-verification" content="">'
          new = '<meta name="google-site-verification" content="1Nq49G4TGniuxL_9xZCwU99q6b5sH0SrDu9jVC-5tRA">'
          if old not in text and new not in text:
              raise SystemExit("Expected Google verification meta tag not found")
          text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm -f .github/workflows/update-google-verification.yml

      - name: Commit Google verification update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-google-verification.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update Google verification meta tag"
          git push
