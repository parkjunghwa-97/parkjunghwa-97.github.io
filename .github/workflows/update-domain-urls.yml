name: Update custom domain URLs

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-domain-urls:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace old GitHub Pages URLs with custom domain
        run: |
          python3 - <<'PY'
          from pathlib import Path

          replacements = {
              "https://parkjunghwa-97.github.io": "https://xn--vk1by2k4ygtjy88bcjm.kr",
              '<meta name="naver-site-verification" content="">': '<meta name="naver-site-verification" content="10c24c9e500133e78d1fc3bcf6cb9b68709fbb4c">',
          }

          for filename in ["index.html", "sitemap.xml", "robots.txt"]:
              path = Path(filename)
              text = path.read_text(encoding="utf-8")
              for old, new in replacements.items():
                  text = text.replace(old, new)
              path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm -f .github/workflows/update-domain-urls.yml

      - name: Commit URL updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html sitemap.xml robots.txt .github/workflows/update-domain-urls.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update site URLs to custom domain"
          git push
