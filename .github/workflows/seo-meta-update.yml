name: Update SEO meta description

on:
  push:
    paths:
      - '.github/seo-meta-trigger.txt'

permissions:
  contents: write

jobs:
  update-meta-description:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Replace only SEO description text
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          old = '인천 부평 기반 청소업체 대한청소만세. 입주청소, 이사청소, 사무실·상가청소, 쓰레기집청소, 유품정리, 고독사청소, 비둘기퇴치 상담. 사진 확인 후 작업 범위와 추가비 가능성을 먼저 안내합니다.'
          new = '서울·경기·인천 입주청소, 이사청소, 특수청소, 유품정리, 비둘기퇴치 비용 안내.'

          text = path.read_text(encoding='utf-8')
          count = text.count(old)
          if count != 3:
              raise SystemExit(f'Expected 3 SEO description matches, found {count}. No file was changed.')

          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Commit SEO meta update
        run: |
          if git diff --quiet -- index.html; then
            echo 'No SEO meta changes to commit.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Update SEO meta descriptions'
          git push
