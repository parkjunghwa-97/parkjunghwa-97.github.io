name: Local SEO fix

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-local-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch local SEO
        run: python3 .github/scripts/local_seo_fix.py

      - name: Commit local SEO updates
        run: |
          git config user.name "ChatGPT Codex Connector"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Refine local SEO keywords" || echo "No changes to commit"
          git push
