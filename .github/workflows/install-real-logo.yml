name: Install real logo
on:
  push:
    paths:
      - .github/workflows/install-real-logo.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write logo and update references
        run: |
          cat > /tmp/logo.b64 <<'B64'

B64
          base64 -d /tmp/logo.b64 > logo.png
          python3 - <<'PY'
from pathlib import Path
p = Path('index.html')
s = p.read_text()
s = s.replace('logo.svg?v=20260627a', 'logo.png?v=20260627b')
s = s.replace('logo.svg', 'logo.png?v=20260627b')
s = s.replace('logo.png?v=20260627a', 'logo.png?v=20260627b')
s = s.replace('logo.png"', 'logo.png?v=20260627b"')
s = s.replace("logo.png'", "logo.png?v=20260627b'")
p.write_text(s)
PY
          rm -f .github/workflows/install-real-logo.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add logo.png index.html .github/workflows/install-real-logo.yml
          git commit -m "Use transparent logo image" || exit 0
          git push
