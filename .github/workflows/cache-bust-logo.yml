name: Cache bust logo URL
on:
  push:
    paths:
      - .github/workflows/cache-bust-logo.yml
  workflow_dispatch:
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add logo cache buster
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          s = p.read_text(encoding='utf-8')
          s = s.replace('logo.svg?v=20260627a', 'logo.svg')
          s = s.replace('logo.svg', 'logo.svg?v=20260627a')
          p.write_text(s, encoding='utf-8')
          PY
          rm -f .github/workflows/cache-bust-logo.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/cache-bust-logo.yml
          git commit -m "Cache bust logo URL" || exit 0
          git push
