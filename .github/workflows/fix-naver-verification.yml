name: Fix Naver verification meta

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix-naver-verification:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix Naver verification content
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          wrong = '<meta name="naver-site-verification" content="eb055f6619e9dcec5a073ecccff6258ef55fd9688">'
          right = '<meta name="naver-site-verification" content="eb055f6619e9dcec5a073ecccf6258ef55fd9688">'
          if wrong not in text and right not in text:
              raise SystemExit("Expected Naver verification meta tag not found")
          text = text.replace(wrong, right)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm -f .github/workflows/fix-naver-verification.yml

      - name: Commit fixed Naver verification tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/fix-naver-verification.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Fix Naver verification meta tag"
          git push
