name: Fix intro logo inline

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  fix-logo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Replace broken external intro logo with inline SVG
        run: |
          python3 - <<'PY'
          import re
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          inline_logo = '''<div class="intro-logo inline-logo" role="img" aria-label="대한청소만세 로고">
        <svg viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
          <defs>
            <filter id="introLogoShadow" x="-30%" y="-30%" width="160%" height="160%">
              <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
            </filter>
          </defs>
          <path d="M96 122 C156 50 282 44 335 112" fill="none" stroke="#dc2626" stroke-width="30" stroke-linecap="round"/>
          <path d="M86 295 C150 368 278 374 336 302" fill="none" stroke="#1d4ed8" stroke-width="30" stroke-linecap="round"/>
          <path d="M105 116 C162 78 253 74 315 117" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
          <path d="M106 302 C162 342 257 344 318 302" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
          <g filter="url(#introLogoShadow)">
            <text x="210" y="187" text-anchor="middle" font-size="64" font-weight="900" font-family="Arial, 'Noto Sans KR', sans-serif" fill="#ffffff">대한</text>
            <text x="210" y="258" text-anchor="middle" font-size="72" font-weight="900" font-family="Arial, 'Noto Sans KR', sans-serif" fill="#ffffff">청소만세</text>
            <text x="210" y="315" text-anchor="middle" font-size="22" font-weight="700" font-family="Arial, 'Noto Sans KR', sans-serif" fill="#e5e7eb">깨끗한 공간, 새로운 시작</text>
          </g>
        </svg>
      </div>'''

          before = html
          html = re.sub(r'<img class="intro-logo"[^>]*alt="대한청소만세 로고"[^>]*>', inline_logo, html, count=1)
          html = html.replace(
              '.intro-logo{width:250px;max-width:68vw;object-fit:contain;margin-bottom:14px;filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));animation:fadeUp .7s ease forwards}',
              '.intro-logo{width:250px;max-width:68vw;object-fit:contain;margin:0 auto 14px;filter:drop-shadow(0 12px 28px rgba(0,0,0,.45));animation:fadeUp .7s ease forwards}.intro-logo svg{display:block;width:100%;height:auto}'
          )
          html = html.replace(
              '@media(max-width:760px){.intro-logo{width:180px;max-width:56vw;margin-bottom:12px}.intro-main{font-size:24px}.intro-sub{font-size:14px;margin-top:14px;line-height:1.7}}',
              '@media(max-width:760px){.intro-logo{width:180px;max-width:56vw;margin:0 auto 12px}.intro-main{font-size:24px}.intro-sub{font-size:14px;margin-top:14px;line-height:1.7}}'
          )
          html = html.replace('logo.svg?v=20260627a', 'logo.svg?v=20260628c')

          if html == before:
              print('No logo changes needed')
          else:
              path.write_text(html, encoding='utf-8')
              print('Intro logo inlined')
          PY
      - name: Commit logo fix
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Fix broken intro logo" || exit 0
          git push
