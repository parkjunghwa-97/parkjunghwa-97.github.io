name: Switch logo references to SVG

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  switch-logo-svg:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Replace logo references
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          text = text.replace("logo.png", "logo.svg")
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm -f .github/workflows/switch-logo-svg.yml

      - name: Commit logo reference update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/switch-logo-svg.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Use SVG logo asset"
          git push
