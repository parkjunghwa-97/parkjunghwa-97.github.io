name: Patch site SEO FAQ review

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch homepage
        run: python3 .github/scripts/patch_site.py

      - name: Commit site updates
        run: |
          git config user.name "ChatGPT Codex Connector"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Add SEO FAQ and review slider" || echo "No changes to commit"
          git push
