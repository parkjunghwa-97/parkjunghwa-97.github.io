name: Update Naver verification meta

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-naver-verification:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Naver verification content
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '<meta name="naver-site-verification" content="10c24c9e500133e78d1fc3bcf6cb9b68709fbb4c">'
          new = '<meta name="naver-site-verification" content="eb055f6619e9dcec5a073ecccff6258ef55fd9688">'
          if old not in text and new not in text:
              raise SystemExit("Expected Naver verification meta tag not found")
          text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: rm -f .github/workflows/update-naver-verification.yml

      - name: Commit Naver verification update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/update-naver-verification.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Update Naver verification meta tag"
          git push
